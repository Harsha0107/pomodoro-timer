<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="hero">
            <p class="eyebrow">Focus mode</p>
            <h1>🍅 Pomodoro Timer</h1>
            <p class="subtitle">Work deeply, rest intentionally, and keep momentum going.</p>
        </div>

        <div class="session-card">
            <div class="session-meta">
                <span class="pill" id="session-type">Work</span>
                <span class="counter-pill">Completed: <strong id="completed-sessions">0</strong></span>
            </div>

            <div class="timer-wrap">
                <div class="progress-ring" id="progress-ring"></div>
                <h2 id="time">25:00</h2>
            </div>

            <p id="status-message" class="status-message">Press start to begin your focus session.</p>

            <div class="buttons">
                <button id="start-btn">Start</button>
                <button id="pause-btn">Pause</button>
                <button id="reset-btn">Reset</button>
                <button id="skip-btn" class="secondary">Skip</button>
            </div>
        </div>

        <div class="settings">
            <h2>Session Settings</h2>

            <label class="setting">
                <span>Work (minutes)</span>
                <input id="work-input" type="number" min="1" max="90" value="25">
            </label>

            <label class="setting">
                <span>Short break (minutes)</span>
                <input id="short-break-input" type="number" min="1" max="30" value="5">
            </label>

            <label class="setting">
                <span>Long break (minutes)</span>
                <input id="long-break-input" type="number" min="1" max="60" value="15">
            </label>

            <button id="apply-settings-btn" class="secondary full-width">Apply Settings</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
